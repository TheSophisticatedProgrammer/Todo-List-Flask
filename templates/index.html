{% extends 'base.html' %}

{% block title %}Todo List Flask{% endblock %}

{% block body %}
<h1>Todo List Flask</h1>

<form action="{{ url_for('home') }}" class="input-container" method="POST">

    <input type="text" placeholder="Enter Task..." id="input-task" name="task_name">
    <button id="add-task">+</button>

</form>

<h2>Tasks</h2>

<div class="todo-container">
    {% for task in tasks %}
        
        <div class="todo">
        <p>{{task.name}}</p>

        <div class="actions">

            <form action="{{ url_for('check', task_id=task.id) }}" method="POST">
                <input type="checkbox" {% if task.checked %}checked{% endif %} onchange="this.form.submit()">
            </form>

            <form action="{{ url_for('delete', task_id=task.id) }}" method="POST">
                <button>Delete</button>
            </form>
            
            <form action="{{ url_for('edit', task_id=task.id) }}" method="POST" class="edit-form">
                <input type="text" id="id-edit-task" name="edit-task" value="{{ task.name }}" required>
                <button type="submit" id="button-edit">Update</button>
            </form>

        </div>
    </div>
    {% endfor %}

</div>


{% endblock %}
